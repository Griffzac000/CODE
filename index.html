<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ole&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <!-- Navbar -->
      <div class="navbar">
        <span class="navbar-brand mb-0 h1">My Collection</span>
      </div>

      <!-- Splash -->
      <div class="splash">
        <h1>Welcome to My Collection</h1>
        <p>Explore a curated selection of beautiful images.</p>
      </div>

      <!-- Image Grid -->
      <div class="image-container">
        <img src="https://picsum.photos/id/10/400/250" class="grid-img" />
        <img src="https://picsum.photos/id/20/400/250" class="grid-img" />
        <img src="https://picsum.photos/id/30/400/250" class="grid-img" />
        <img src="https://picsum.photos/id/40/400/250" class="grid-img" />
        <img src="https://picsum.photos/id/50/400/250" class="grid-img" />
        <img src="https://picsum.photos/id/60/400/250" class="grid-img" />
      </div>
    </div>
    <div class="footer">
      <p>&copy; 2024 My Collection. All rights reserved.</p>
  </body>
</html>
