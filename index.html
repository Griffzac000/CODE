<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>

<body>
    <div class="intro-screen" id="introScreen">
        <video src="intro.mp4" class="intro-mp4" autoplay loop muted playsinline></video>
        <div class="intro-text">
            <h1 class="line-1">Hello I'm Zachai</h1>
            <h2 class="line-2">And this is my portfolio.</h2>
        </div>
    </div>

    <div class="stars" id="stars"></div>

    <div class="space-wrapper">
        <div class="space-canvas">
            <div class="center">
                <div id="earth"></div>

                <div class="orbit-ring ring-1">
                    <div class="planet planet-1"></div>
                </div>
                <div class="orbit-ring ring-2">
                    <div class="planet planet-2"></div>
                </div>
                <div class="orbit-ring ring-3">
                    <div class="planet planet-3"></div>
                </div>
                <div class="orbit-ring ring-4">
                    <div class="planet planet-4"></div>
                </div>
                <div class="orbit-ring ring-5">
                    <div class="planet planet-5"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
